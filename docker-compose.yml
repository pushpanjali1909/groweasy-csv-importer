version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AI_MODEL=${AI_MODEL:-anthropic/claude-sonnet-4.5}
      - BATCH_SIZE=${BATCH_SIZE:-20}
      - BATCH_CONCURRENCY=${BATCH_CONCURRENCY:-3}
      - BATCH_MAX_RETRIES=${BATCH_MAX_RETRIES:-2}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
